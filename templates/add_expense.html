{% extends "base.html" %}

{% block content %}
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden md:max-w-2xl mt-8">
        <div class="p-8">
            <h2 class="text-2xl font-bold mb-4">Add Expense</h2>
            <form method="POST">
                <div class="mb-4">
                    <label for="amount" class="block text-gray-700 font-bold mb-2">Amount
                        ({{ config.currency }})</label>
                    <input type="number" step="0.01" name="amount" id="amount" required
                           class="w-full px-3 py-2 border rounded-lg text-gray-700 focus:outline-none focus:border-blue-500">
                </div>
                <div class="mb-4">
                    <label for="category" class="block text-gray-700 font-bold mb-2">Category</label>
                    <select name="category" id="category" required
                            class="w-full px-3 py-2 border rounded-lg text-gray-700 focus:outline-none focus:border-blue-500">
                        {% for category in config.categories %}
                            <option value="{{ category }}">{{ category }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-4">
                    <label for="date" class="block text-gray-700 font-bold mb-2">Date</label>
                    <input type="date" name="date" id="date" required
                           class="w-full px-3 py-2 border rounded-lg text-gray-700 focus:outline-none focus:border-blue-500">
                </div>
                <button type="submit"
                        class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-600 focus:outline-none focus:shadow-outline">
                    Add Expense
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('date').value = new Date().toISOString().substr(0, 10);
        });
    </script>

{% endblock %}
