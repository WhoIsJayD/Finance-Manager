{% extends "base.html" %}

{% block content %}
    <h1 class="text-3xl font-bold mb-8">Financial Reports</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-2xl font-bold mb-4">Monthly Report</h2>
            {{ monthly_report|safe }}
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-2xl font-bold mb-4">Yearly Report</h2>
            {{ yearly_report|safe }}
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-2xl font-bold mb-4">Weekly Report</h2>
            {{ weekly_report|safe }}
        </div>
    </div>
{% endblock %}
